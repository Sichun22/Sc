{% extends "navbar.html" %}

{% block content %}
<div style="max-width: 900px; margin: 0 auto; padding: 20px; font-family: 'Microsoft JhengHei', sans-serif;">
    <h2 style="color: #27ae60; border-bottom: 2px solid #27ae60; padding-bottom: 10px;">🔍 輔大數學系智能課程查詢系統</h2>
    <p style="color: #666;">輸入想查詢的課程關鍵字，系統會即時掃描輔大數學系課表，整理出<b>課程名稱、任課老師、上課時間與教室</b>。</p>

    <!-- 搜尋列 -->
    <div style="margin: 25px 0; display: flex; gap: 10px;">
        <input
            type="text"
            id="keyword"
            placeholder="請輸入課程名稱，例如：微積分、線性代數、程式、人工智慧、AI"
            style="flex: 1; padding: 12px; border: 2px solid #27ae60; border-radius: 6px; font-size: 16px; outline: none;"
            onkeypress="handleKeyPress(event)"
        >
        <button onclick="searchCourse()" style="padding: 12px 30px; background-color: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold;">
            🔍 查詢課程
        </button>
    </div>

    <div style="margin-bottom: 20px;">
        <a href="/fju_math" style="color: #2980b9; text-decoration: none; font-weight: bold;">← 前往查看「輔大數學系所有資料庫清單」</a>
    </div>

    <hr style="border: 0; border-top: 1px solid #dee2e6; margin: 25px 0;">

    <!-- 搜尋結果 -->
    <div id="result"></div>
</div>

<script>
function handleKeyPress(event) {
    if (event.key === "Enter") {
        searchCourse();
    }
}

function searchCourse() {
    const keyword = document.getElementById("keyword").value.trim();
    const resultDiv = document.getElementById("result");

    if (!keyword) {
        resultDiv.innerHTML = "<p style='color: #c0392b; font-weight: bold;'>⚠️ 請先輸入課程關鍵字。</p>";
        return;
    }

    // 高能爬蟲啟動動態特效
    resultDiv.innerHTML = `
        <div style="padding: 25px; background: #e8f8f5; border-left: 6px solid #27ae60; border-radius: 5px;">
            <p style="color: #117a65; font-weight: bold; margin: 0 0 8px 0; font-size: 16px;">🔍 正在查詢課程資料</p>
            <p style="color: #555; margin: 0; font-size: 14px;">正在讀取輔大數學系課表，並整理課名、老師、時間與教室。</p>
        </div>
    `;

    fetch(`/api/course_search?keyword=${encodeURIComponent(keyword)}`)
    .then(response => response.json())
    .then(data => {
        let html = "";

        if (!data.results || data.results.length === 0) {
            html = `
                <div style='padding: 20px; background-color: #fead9a; color: #78281f; border-radius: 6px; font-weight: bold;'>
                    ❌ 沒有找到包含「${keyword}」的課程資料，請改用課名關鍵字再試，例如：微積分、線性代數、程式、人工智慧。
                </div>
            `;
        } else {
            html = `<p style="color: #27ae60; margin-bottom: 15px; font-weight: bold;">✅ 查詢完成，共找到 <strong>${data.results.length}</strong> 筆課程資料：</p>`;
            
            data.results.forEach(item => {
                const name = item.course_name || '課程名稱未提供';
                const teacher = item.teacher || '教師未提供';
                const time = item.time || '時間未提供';
                const room = item.room || '教室未提供';
                const group = item.group || '課程群組';
                const source = item.source || '#';

                html += `
                    <div style="background: #ffffff; border: 1px solid #d5dbdb; border-radius: 8px; padding: 20px; margin-bottom: 15px; box-shadow: 0 3px 6px rgba(0,0,0,0.04);">
                        <div style="margin-bottom: 12px; display: flex; gap: 10px; flex-wrap: wrap;">
                            <span style="background: #27ae60; color: white; padding: 4px 10px; font-size: 12px; font-weight: bold; border-radius: 3px;">${group}</span>
                            <span style="background: #2980b9; color: white; padding: 4px 10px; font-size: 12px; font-weight: bold; border-radius: 3px;">${time}</span>
                        </div>

                        <h3 style="margin: 0 0 10px 0; color: #2c3e50;">📖 ${name}</h3>
                        <div style="font-size: 15px; color: #2c3e50; line-height: 1.8; margin-bottom: 12px; background: #f4f6f6; padding: 12px; border-radius: 5px; border-left: 4px solid #7f8c8d;">
                            👨‍🏫 任課老師：${teacher}<br>
                            🕒 上課時間：${time}<br>
                            🏫 教室：${room}
                        </div>

                        <div style="font-size: 13px; color: #7f8c8d;">
                            📍 資料來源：<a href="${source}" target="_blank" style="color: #2980b9; text-decoration: none; font-weight: bold;">輔大數學系原課表</a>
                        </div>
                    </div>
                `;
            });
        }

        resultDiv.innerHTML = html;
    })
    .catch(error => {
        resultDiv.innerHTML = "<div style='padding: 20px; background-color: #f9ebeb; color: #922b21; border-radius: 4px; font-weight: bold;'>❌ 課程查詢失敗，請確認網路連線或後端 Python 是否正常執行。</div>";
    });
}
</script>
{% endblock %}
